<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Dashboard — Prism</title>
  <link rel="stylesheet" href="{{ASSETS}}/style.css" />
</head>
<body>
  <div class="bg-veil"></div>
  <div id="app">
    <header class="fd-header">
      <div>
        <div class="fd-title" id="fd-title">Markets</div>
        <div class="fd-subtitle" id="fd-subtitle">Loading market data…</div>
      </div>
      <div class="fd-header-right">
        <div class="range-toggle" id="range-toggle">
          <button type="button" class="range-btn active" data-range="1d">1D</button>
          <button type="button" class="range-btn" data-range="5d">5D</button>
          <button type="button" class="range-btn" data-range="1mo">1M</button>
          <button type="button" class="range-btn" data-range="6mo">6M</button>
          <button type="button" class="range-btn" data-range="ytd">YTD</button>
        </div>
        <div class="lang-toggle">
          <button type="button" class="lang-btn active" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="zh">繁中</button>
        </div>
        <div class="fd-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Connecting…</span>
        </div>
      </div>
    </header>

    <!-- Rolling ticker tape -->
    <div class="ticker-tape" id="ticker-tape">
      <div class="ticker-tape-track" id="ticker-tape-track"></div>
    </div>

    <!-- Index bar -->
    <div class="index-bar" id="index-bar">
      <div class="index-card skeleton-card"><div class="skeleton" style="height:60px"></div></div>
      <div class="index-card skeleton-card"><div class="skeleton" style="height:60px"></div></div>
      <div class="index-card skeleton-card"><div class="skeleton" style="height:60px"></div></div>
      <div class="index-card skeleton-card"><div class="skeleton" style="height:60px"></div></div>
      <div class="index-card skeleton-card"><div class="skeleton" style="height:60px"></div></div>
    </div>

    <!-- Three-column grid -->
    <div class="fd-grid">
      <aside class="fd-sidebar">
        <section class="fd-card" id="watchlist-panel">
          <div class="fd-card-title" id="title-watchlist">Watchlist</div>
          <div id="watchlist-body"><div class="skeleton" style="height:120px;border-radius:8px"></div></div>
          <div class="watchlist-add">
            <input type="text" id="watchlist-input" placeholder="Add ticker…" maxlength="10" autocomplete="off" />
            <button type="button" id="watchlist-add-btn" class="btn-add">+</button>
          </div>
        </section>

        <section class="fd-card" id="sectors-panel">
          <div class="fd-card-title" id="title-sectors">Equity Sectors</div>
          <div id="sectors-body"><div class="skeleton" style="height:200px;border-radius:8px"></div></div>
        </section>
      </aside>

      <main class="fd-main">
        <section class="fd-card" id="news-panel">
          <div class="fd-card-title" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span id="title-news">Market News</span>
            <button class="news-reload-btn" id="news-reload-btn" title="Reload news">↻</button>
            <span class="filter-badge" id="news-filter-badge" style="display:none">
              <span id="news-filter-label"></span>
              <button class="filter-clear-btn" id="news-filter-clear" title="Clear filter">✕</button>
            </span>
          </div>
          <div class="news-search-row">
            <svg class="news-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="news-search-input" class="news-search-input" placeholder="Search headlines…" autocomplete="off" maxlength="100" />
            <button type="button" id="news-search-clear" class="news-search-clear" style="display:none" title="Clear search">✕</button>
          </div>
          <div id="news-body"><div class="skeleton" style="height:300px;border-radius:8px"></div></div>
          <div id="news-footer" style="display:none;text-align:center;padding-top:12px">
            <button id="news-more-btn" class="btn-load-more">Load more</button>
          </div>
        </section>
      </main>

      <aside class="fd-research">
        <div class="fd-card" id="summary-panel">
          <div class="fd-card-title" id="title-summary">Market Summary</div>
          <div id="summary-body"><div class="skeleton" style="height:80px;border-radius:8px"></div></div>
        </div>

        <div class="fd-card" id="assets-panel">
          <div class="fd-card-title" id="title-assets">Asset Highlights</div>
          <div id="assets-body"><div class="skeleton" style="height:80px;border-radius:8px"></div></div>
        </div>

        <div class="fd-card" id="movers-panel">
          <div class="fd-card-title" id="title-movers">Top Movers</div>
          <div id="movers-body"><div class="skeleton" style="height:120px;border-radius:8px"></div></div>
        </div>

        <div class="fd-card" id="trending-panel">
          <div class="fd-card-title" id="title-trending">Trending</div>
          <div id="trending-body"><div class="skeleton" style="height:100px;border-radius:8px"></div></div>
        </div>

      </aside>
    </div>
  </div>

  <!-- AI Drawer overlay + panel -->
  <div class="ai-drawer-overlay" id="ai-drawer-overlay"></div>
  <aside class="ai-drawer" id="ai-drawer">
    <div class="ai-drawer-header">
      <div class="ai-drawer-title">
        <svg class="ai-drawer-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="4"/><circle cx="9" cy="16" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="16" r="1.2" fill="currentColor" stroke="none"/><line x1="10" y1="19" x2="14" y2="19"/>
        </svg>
        <span id="title-analysis">AI Analysis</span>
      </div>
      <div class="ai-drawer-header-actions">
        <button id="chat-clear-btn" class="ai-drawer-clear" title="New conversation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
        <button id="ai-drawer-close" class="ai-drawer-close" title="Close">&times;</button>
      </div>
    </div>

    <!-- Collapsible Market Analysis section -->
    <div class="ai-drawer-analysis">
      <div class="analysis-toggle" id="analysis-toggle" role="button" tabindex="0">
        <span id="analysis-toggle-label">Market Analysis</span>
        <div class="analysis-toggle-right">
          <button id="analysis-refresh-btn" class="btn-refresh" type="button" title="Refresh analysis">↺</button>
          <svg class="analysis-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 4.5l3 3 3-3"/>
          </svg>
        </div>
      </div>
      <div class="analysis-collapsible" id="analysis-collapsible">
        <div id="analysis-body"><div class="skeleton" style="height:80px;border-radius:8px"></div></div>
      </div>
    </div>

    <!-- Chat log -->
    <div class="chat-log" id="chat-log">
      <div class="chat-empty" id="chat-empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted);opacity:0.5">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <span id="chat-empty-text">Ask anything about the markets…</span>
      </div>
    </div>

    <!-- Input pinned to bottom -->
    <div class="ai-drawer-input">
      <div class="chat-input-row">
        <input
          type="text"
          id="chat-input"
          class="chat-input"
          placeholder="Ask AI… add TSLA, focus news on Fed…"
          autocomplete="off"
          maxlength="200"
        />
        <button id="chat-send-btn" class="chat-send-btn" title="Send">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Floating AI toggle button -->
  <button class="ai-fab" id="ai-fab" title="AI Analysis">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="4"/><circle cx="9" cy="16" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="16" r="1.2" fill="currentColor" stroke="none"/><line x1="10" y1="19" x2="14" y2="19"/>
    </svg>
  </button>

  <div class="toasts" id="toasts"></div>
  <script src="{{ASSETS}}/app.js"></script>
</body>
</html>
